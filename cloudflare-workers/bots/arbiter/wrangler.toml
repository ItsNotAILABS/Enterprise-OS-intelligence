name            = "rship-arbiter"
main            = "worker.js"
compatibility_date = "2024-09-02"

# Required secrets:
#   SLACK_SIGNING_SECRET   — from api.slack.com/apps → Basic Information
#   SLACK_BOT_TOKEN        — Bot User OAuth Token (xoxb-...)
#
# Optional:
#   ARBITER_OPS_CHANNEL    — Channel ID to post workflow notifications (e.g. #rship-ops)

[vars]
DESIGNATION     = "RSHIP-BOT-ARB-001"
BOT_NAME        = "ARBITER"
BOT_LATIN       = "arbiter"
BOT_MEANING     = "Task Master · Workflow Judge · Orchestrator"
VERSION         = "1.0.0"
