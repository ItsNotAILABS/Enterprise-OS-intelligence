name            = "rship-sentinel"
main            = "worker.js"
compatibility_date = "2024-09-02"

# Cron trigger — alert scan every 5 minutes
[[triggers.crons]]
cron = "*/5 * * * *"

# Optional secrets:
#   SENTINEL_SLACK_WEBHOOK    — Slack incoming webhook for alerts
#   SENTINEL_DISCORD_WEBHOOK  — Discord webhook for alerts
#   SENTINEL_AUTH_TOKEN       — Protect rule management endpoints

[vars]
DESIGNATION     = "RSHIP-BOT-SNT-001"
BOT_NAME        = "SENTINEL"
BOT_LATIN       = "sentinel"
BOT_MEANING     = "Watchman · Guardian · Alert Monitor"
VERSION         = "1.0.0"
