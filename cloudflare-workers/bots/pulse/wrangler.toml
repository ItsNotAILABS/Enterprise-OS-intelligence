name            = "rship-pulse"
main            = "worker.js"
compatibility_date = "2024-09-02"

# Cron triggers — intelligence reports on schedule
[[triggers.crons]]
cron = "0 * * * *"     # Top of every hour — hourly pulse

[[triggers.crons]]
cron = "0 9 * * 1-5"   # 09:00 UTC Mon-Fri — market open briefing

[[triggers.crons]]
cron = "0 0 * * *"     # Midnight UTC daily — full intelligence digest

# Optional secrets:
#   PULSE_WEBHOOK_SLACK    — Slack incoming webhook for scheduled reports
#   PULSE_WEBHOOK_DISCORD  — Discord webhook

[vars]
DESIGNATION     = "RSHIP-BOT-PLS-001"
BOT_NAME        = "PULSE"
BOT_LATIN       = "pulsus"
BOT_MEANING     = "Heartbeat · Rhythm · Intelligence Signal"
VERSION         = "1.0.0"
