name            = "rship-herald"
main            = "worker.js"
compatibility_date = "2024-09-02"

# Set these as Worker Secrets (wrangler secret put SLACK_SIGNING_SECRET):
#   SLACK_SIGNING_SECRET   — from your Slack app settings
#   SLACK_BOT_TOKEN        — Bot User OAuth Token (xoxb-...)
#   RSHIP_NETWORK_URL      — base URL of your CEREBRUM instance

[vars]
DESIGNATION     = "RSHIP-BOT-HLD-001"
BOT_NAME        = "HERALD"
BOT_LATIN       = "heraldus"
BOT_MEANING     = "Messenger · Herald · Announcer"
VERSION         = "1.0.0"
