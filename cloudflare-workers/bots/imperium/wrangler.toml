name            = "rship-imperium"
main            = "worker.js"
compatibility_date = "2024-09-02"

# Required secrets:
#   SLACK_SIGNING_SECRET   — from api.slack.com/apps → Basic Information
#   SLACK_BOT_TOKEN        — Bot User OAuth Token (xoxb-...)
#
# Optional:
#   IMPERIUM_OPS_CHANNEL   — Slack channel ID where /org speak posts by default

[vars]
DESIGNATION     = "RSHIP-BOT-IMP-001"
BOT_NAME        = "IMPERIUM"
BOT_LATIN       = "imperium"
BOT_MEANING     = "Command · Authority · Empire"
VERSION         = "1.0.0"
