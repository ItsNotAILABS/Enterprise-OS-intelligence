    "COGNITO",
    "MEMORIA",
    "VOLUNTAS",
    "PERCEPTUM",
    "NEXUM",
    "GENESIS-ENGINE",
    "RESOLVER",
    "EMERGENT",
    "SOVEREIGN",
    "RUNTIME-CORE"
]

[engines.alpha.COGNITO]
formula = "Σᵢ NEC_mean[i] × basis[i] × φ^depth[i]"
description = "Neural encoding with phi-weighted depth"

[engines.alpha.MEMORIA]
formula = "e^(-elapsed/(τ×φ))"
