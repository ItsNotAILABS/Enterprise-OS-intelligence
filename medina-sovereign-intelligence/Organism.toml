# ═══════════════════════════════════════════════════════════════════════════════
# SCHUMANN HARMONICS (7 frequencies)
# Earth's electromagnetic resonance frequencies for ARCH-WAVE
# ═══════════════════════════════════════════════════════════════════════════════

[schumann]
fundamental = 7.83     # Hz - primary heartbeat frequency
harmonics = [7.83, 14.3, 20.8, 27.3, 33.8, 39.0, 45.0]
harmonic_count = 7

# φ⁻ⁱ amplitude decay for each harmonic
[schumann.amplitudes]
h1 = 1.0               # 7.83 Hz - φ⁰
h2 = 0.618             # 14.3 Hz - φ⁻¹
h3 = 0.382             # 20.8 Hz - φ⁻²
h4 = 0.236             # 27.3 Hz - φ⁻³
h5 = 0.146             # 33.8 Hz - φ⁻⁴
h6 = 0.090             # 39.0 Hz - φ⁻⁵
h7 = 0.056             # 45.0 Hz - φ⁻⁶

# ═══════════════════════════════════════════════════════════════════════════════
# HEARTBEAT TIMING
# 11-step sovereign pulse wired in medina_heartbeat_mod.mo
# ═══════════════════════════════════════════════════════════════════════════════

[heartbeat]
frequency_hz = 7.83                   # Schumann fundamental
interval_ms = 127.71                  # 1000 / 7.83
steps = [
    "ARCH-WAVE",
    "COMPRESSUS-REX",
    "NeurochemRegulator",
    "PERCEPTUS-ALPHA",
    "ALPHA-COGNITO",
    "ORACULUM-PRIMUS",
    "ARCH-MIRROR",
    "WORKFLOW-WORKERS",
    "ARCH-PRIME",
    "crystallize",
    "snapshot"
]
step_count = 11
crystallization_interval = 21         # F(8)
snapshot_interval = 987               # F(16)

# ═══════════════════════════════════════════════════════════════════════════════
# WORKER TIERS
# 100 PRIME + 62 GOLD + 38 SILVER = 200 total workers
# ═══════════════════════════════════════════════════════════════════════════════

[workers]
total = 200

[workers.prime]
count = 100
priority = 1
capabilities = ["cognitive", "prediction", "genesis"]
resource_multiplier = 1.618           # φ

[workers.gold]
count = 62                            # ~F(10)/φ
priority = 2
capabilities = ["arch", "protocol", "bridge"]
resource_multiplier = 1.0

[workers.silver]
count = 38                            # ~F(10)/φ²
priority = 3
capabilities = ["workflow", "mirror", "monitor"]
resource_multiplier = 0.618           # φ⁻¹

# ═══════════════════════════════════════════════════════════════════════════════
# THREE-CANISTER TOPOLOGY
# Genesis, Cognitive, and Archive canisters
# ═══════════════════════════════════════════════════════════════════════════════

[topology]
canister_count = 3

[topology.genesis]
id = "genesis"
role = "bootstrapper"
functions = ["bootstrap", "processExistingHeap", "onWrite"]
heap_size_gb = 1
compression = "COMPRESSUS-REX"

[topology.cognitive]
id = "cognitive"
role = "intelligence"
functions = ["predict", "perceive", "resolve", "emerge"]
engines = ["ALPHA", "ORACULUM"]
memory_model = "PHI-EMA"

[topology.archive]
id = "archive"
role = "persistence"
functions = ["crystallize", "snapshot", "version"]
compression = "SRI_YANTRA"            # 4/5 compression ratio
verification = "PHI_HASH"

