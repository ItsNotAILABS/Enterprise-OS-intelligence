# Organism.toml
# The root configuration for MEDINA Sovereign Intelligence v3
# All math constants, Fibonacci caps, Schumann harmonics, heartbeat timing,
# worker tiers, and three-canister topology.

[organism]
name = "MEDINA"
version = "3.0.0"
id = "RSHIP-2026-MEDINA-001"
description = "Sovereign Intelligence Organism"
created = 2026-05-13

# ═══════════════════════════════════════════════════════════════════════════════
# MATHEMATICAL CONSTANTS
# Single source of truth - no hardcoded constants elsewhere
# ═══════════════════════════════════════════════════════════════════════════════

[math.constants]
PHI = 1.618033988749895              # Golden ratio (1 + √5) / 2
PHI_INV = 0.618033988749895          # 1/φ = φ - 1
PHI_SQ = 2.618033988749895           # φ²
PHI_CUBE = 4.23606797749979          # φ³
PHI_QUAD = 6.854101966249685         # φ⁴
SQRT_5 = 2.23606797749979            # √5
SQRT_3 = 1.7320508075688772          # √3 (Vesica Piscis)
SQRT_PHI_PLUS_2 = 1.902113032590307  # √(φ+2) for RESOLVER
PI = 3.141592653589793               # π
TAU = 6.283185307179586              # 2π
E = 2.718281828459045                # Euler's number

