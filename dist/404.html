<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — RSHIP Enterprise OS Intelligence</title>
  <style>
    :root {
      --phi: 1.618033988749895;
      --gold: #ffd700;
      --cyan: #00d4ff;
      --bg: #0a0a0f;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      background: var(--bg);
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }
    .logo {
      font-size: 4rem;
      background: linear-gradient(135deg, var(--gold), var(--cyan));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 1rem;
    }
    .code {
      font-size: 6rem;
      font-weight: 100;
      color: #333;
      margin-bottom: 1rem;
    }
    h1 {
      font-size: 1.5rem;
      font-weight: 300;
      margin-bottom: 0.5rem;
    }
    p {
      color: #888;
      margin-bottom: 2rem;
    }
    a {
      color: var(--cyan);
      text-decoration: none;
      padding: 0.75rem 2rem;
      border: 1px solid var(--cyan);
      border-radius: 4px;
      transition: all 0.3s ease;
    }
    a:hover {
      background: var(--cyan);
      color: var(--bg);
    }
    .footer {
      position: absolute;
      bottom: 2rem;
      font-size: 0.75rem;
      color: #555;
    }
  </style>
</head>
<body>
  <div class="logo">◎</div>
  <div class="code">404</div>
  <h1>Path Not Found</h1>
  <p>The requested intelligence module does not exist at this location.</p>
  <a href="/">← Return to Portal</a>
  <div class="footer">
    © 2026 Alfredo Medina Hernandez · RSHIP AGI Systems
  </div>
</body>
</html>
