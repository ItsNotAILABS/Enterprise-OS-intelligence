name: "SDK Release [E15] — Auto-publish on version bump"

# ─────────────────────────────────────────────────────────────────────────────
# GUBERNATIO VIVA — SDK Auto-Update Mechanism
# Engine identity: E15 — Render/Export Engine (REMEMBER GROUP)
#
# When you update the version in package.json and push, this workflow:
#   1. Detects the version bump
#   2. Validates all 15 engines are intact (ORO CI inline check)
#   3. Auto-tags the release in git
#   4. Creates a GitHub Release with the version number
#   5. Publishes to npm (if NPM_TOKEN secret is configured)
#
# Every SDK consumer running a semver range (e.g. "^1.x.x") gets the update
# automatically on their next install or npm update.
# You push once. Everyone gets it. That's the auto-update mechanism.
#
# No manual release steps. No human in the loop for routine version bumps.
# VIVIT · MEMINIT · GUBERNAT — the SDK is always alive.
# ─────────────────────────────────────────────────────────────────────────────

on:
  push:
    branches:
      - main
    paths:
      - 'sdk/effecttrace-governance-organism/package.json'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run — validate but do not publish'
        required: false
        default: 'false'
        type: boolean

permissions:
  contents: write   # needed to create tags and GitHub releases

jobs:
  sdk-release:
    name: "[E15] SDK Release — Auto-publish"
    runs-on: ubuntu-latest

    steps:
      - name: "[E1] Ingest — Checkout repository"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: "[E2] Parse — Setup Node.js runtime"
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: "[E2] Parse — Read current version"
        id: version
        working-directory: sdk/effecttrace-governance-organism
        run: |
          VERSION=$(node -p "require('./package.json').version")
          NAME=$(node -p "require('./package.json').name")
          echo "version=$VERSION"   >> "$GITHUB_OUTPUT"
          echo "name=$NAME"         >> "$GITHUB_OUTPUT"
          echo "tag=v${VERSION}"    >> "$GITHUB_OUTPUT"
          echo "Package: $NAME@$VERSION"

      - name: "[E3] Resolve — Check if tag already exists"
        id: check_tag
        run: |
          if git rev-parse "refs/tags/${{ steps.version.outputs.tag }}" >/dev/null 2>&1; then
            echo "exists=true"  >> "$GITHUB_OUTPUT"
            echo "Tag ${{ steps.version.outputs.tag }} already exists — skipping release."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "Tag ${{ steps.version.outputs.tag }} is new — proceeding with release."
          fi

      - name: "[E1–E15] TRACE·VERIFY·REMEMBER — Validate all 15 engines before release"
        if: steps.check_tag.outputs.exists == 'false'
        working-directory: sdk/effecttrace-governance-organism
        run: |
          node --input-type=module << 'EOF'
          const [m1,m2,m3,m4,m5,m6,m7,m8,m9,m10,m11,m12,m13,m14,m15] = await Promise.all([
            import('./src/engines/e1-proposal-ingest.js'),
            import('./src/engines/e2-payload-parser.js'),
            import('./src/engines/e3-target-resolver.js'),
            import('./src/engines/e4-effect-path.js'),
            import('./src/engines/e5-runtime-truth.js'),
            import('./src/engines/e6-risk-classifier.js'),
            import('./src/engines/e7-verification-plan.js'),
            import('./src/engines/e8-reviewer-integration.js'),
            import('./src/engines/e9-governance-memory.js'),
            import('./src/engines/e10-post-execution-watch.js'),
            import('./src/engines/e11-agent-council.js'),
            import('./src/engines/e12-public-summary.js'),
            import('./src/engines/e13-evidence-registry.js'),
            import('./src/engines/e14-dispute-correction.js'),
            import('./src/engines/e15-render-export.js'),
          ]);
          const engines = [
            [m1,'ProposalIngestEngine'],[m2,'PayloadParserEngine'],[m3,'TargetResolverEngine'],
            [m4,'EffectPathEngine'],[m5,'RuntimeTruthEngine'],[m6,'RiskClassifierEngine'],
            [m7,'VerificationPlanEngine'],[m8,'ReviewerIntegrationEngine'],[m9,'GovernanceMemoryEngine'],
            [m10,'PostExecutionWatchEngine'],[m11,'AgentCouncilEngine'],[m12,'PublicSummaryEngine'],
            [m13,'EvidenceRegistryEngine'],[m14,'DisputeCorrectionEngine'],[m15,'RenderabilityExportEngine'],
          ];
          for (const [mod, name] of engines) {
            if (!mod[name]) { console.error(`✗ ${name} missing`); process.exit(1); }
            new mod[name]();
            console.log(`  ✓ ${name}`);
          }
          // Validate ecosystem catalog
          const { ECOSYSTEM_CATALOG } = await import('./src/ecosystem-catalog.js');
          if (ECOSYSTEM_CATALOG.engines.length !== 15) { console.error('✗ Catalog engine count mismatch'); process.exit(1); }
          console.log(`  ✓ Ecosystem catalog (${ECOSYSTEM_CATALOG.engines.length} engines, ${ECOSYSTEM_CATALOG.papers.length} papers)`);
          console.log('\n  15/15 engines + catalog verified — TRACE·VERIFY·REMEMBER intact\n');
          EOF

      - name: "[E15] Export — Create git tag"
        if: steps.check_tag.outputs.exists == 'false' && github.event.inputs.dry_run != 'true'
        run: |
          git config user.name  "Gubernatio Viva [E15]"
          git config user.email "actions@github.com"
          git tag -a "${{ steps.version.outputs.tag }}" -m "Release ${{ steps.version.outputs.tag }} — Gubernatio Viva · VIVIT · MEMINIT · GUBERNAT"
          git push origin "${{ steps.version.outputs.tag }}"

      - name: "[E15] Export — Create GitHub Release"
        if: steps.check_tag.outputs.exists == 'false' && github.event.inputs.dry_run != 'true'
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name:     ${{ steps.version.outputs.tag }}
          release_name: "${{ steps.version.outputs.name }}@${{ steps.version.outputs.version }}"
          body: |
            ## ${{ steps.version.outputs.name }} ${{ steps.version.outputs.tag }}

            **Gubernatio Viva — VIVIT · MEMINIT · GUBERNAT**
            TRACE · VERIFY · REMEMBER

            ### What's in this release
            - 15-engine governance consequence pipeline (E1–E15)
            - Agent Council: ARCHON · VECTOR · LUMEN · FORGE
            - Release Edition (`/release`) + Speedster Edition (`/speedster`)
            - Ecosystem catalog — the organism knows its own architecture at runtime
            - Two-pass AI document intelligence pipeline

            ### SDK Editions
            | Edition | Import | Who It's For |
            |---------|--------|-------------|
            | Release | `@medina/effecttrace-governance-organism/release` | Production deployments |
            | Speedster | `@medina/effecttrace-governance-organism/speedster` | Dev iteration |

            *Alfredo Medina Hernandez · Medina Tech · Chaos Lab · Dallas, Texas*
          draft: false
          prerelease: false

      - name: "[E15] Export — Publish to npm"
        if: steps.check_tag.outputs.exists == 'false' && github.event.inputs.dry_run != 'true' && env.NPM_TOKEN != ''
        working-directory: sdk/effecttrace-governance-organism
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          npm publish --access public
          echo "Published ${{ steps.version.outputs.name }}@${{ steps.version.outputs.version }} to npm"

      - name: "[E15] Export — Publish release summary"
        run: |
          echo "### SDK Release [E15] — ${{ steps.version.outputs.tag }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [ "${{ steps.check_tag.outputs.exists }}" == "true" ]; then
            echo "⏭ Tag ${{ steps.version.outputs.tag }} already exists — no release needed." >> "$GITHUB_STEP_SUMMARY"
          elif [ "${{ github.event.inputs.dry_run }}" == "true" ]; then
            echo "🔍 Dry run — validation passed, no publish." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "| Step | Status |" >> "$GITHUB_STEP_SUMMARY"
            echo "|------|--------|" >> "$GITHUB_STEP_SUMMARY"
            echo "| 15-engine validation | ✅ |" >> "$GITHUB_STEP_SUMMARY"
            echo "| Git tag created | ✅ ${{ steps.version.outputs.tag }} |" >> "$GITHUB_STEP_SUMMARY"
            echo "| GitHub Release created | ✅ |" >> "$GITHUB_STEP_SUMMARY"
            echo "| npm publish | ✅ (if NPM_TOKEN configured) |" >> "$GITHUB_STEP_SUMMARY"
          fi
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Every SDK consumer on a semver range receives this update automatically." >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "*Gubernatio Viva — VIVIT · MEMINIT · GUBERNAT — Medina Tech · Chaos Lab*" >> "$GITHUB_STEP_SUMMARY"
