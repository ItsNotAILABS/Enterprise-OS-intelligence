name: "Sovereign Intake [E13·E14·E15] — Auto-Sanitize and Commit"

# ─────────────────────────────────────────────────────────────────────────────
# Engine identity mapping
#   E13 — Evidence Registry     : keeps every claim attached to a source
#   E14 — Dispute/Correction    : allows auto-corrections and version history
#   E15 — Render/Export Engine  : writes the final clean public-safe output
#
# This workflow is the live INTAKE end of the document pipeline.
# When any markdown document is pushed to papers/, this job:
#   1. [E13] Runs the Mundator Documentorum sanitizer
#      — auto-redacts canister IDs, logic code blocks, brand strings, API keys
#   2. [E14] If the sanitizer made corrections, commits the cleaned files back
#      to the same branch automatically — no human step required
#   3. [E15] Produces a public-showcase-ready summary in the Actions step summary
#   4. If any content cannot be auto-fixed, the job fails and blocks the push
#      until the author resolves it manually
#
# The doc-clean.yml workflow is the GUARD (fails on problems, read-only).
# This workflow is the INTAKE (cleans what it can, then guards).
# ─────────────────────────────────────────────────────────────────────────────

on:
  push:
    branches-ignore:
      - main          # main is protected — nothing auto-commits to it
    paths:
      - 'papers/**'

permissions:
  contents: write   # needed to push the sanitized commit back

jobs:
  intake:
    name: "[E13·E14·E15] Sovereign Paper Intake"
    runs-on: ubuntu-latest

    steps:
      - name: "[E1] Ingest — Checkout branch"
        uses: actions/checkout@v4
        with:
          # Use the token so the auto-commit push is accepted
          token: ${{ secrets.GITHUB_TOKEN }}
          # Fetch the full branch so we can push back
          fetch-depth: 0

      - name: "[E2] Parse — Setup Node.js runtime"
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: "[E13·E14] Evidence Registry + Dispute/Correction — Run Mundator Documentorum (auto-fix mode)"
        id: sanitize
        run: |
          node tools/doc-sanitizer.js papers/
          # Capture whether any files were modified by the auto-fixer
          if [ -n "$(git diff --name-only)" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Sanitizer auto-fixed corrections — will commit cleaned files."
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "All documents were already clean."
          fi

      - name: "[E14·E15] Dispute/Correction + Export — Commit sanitized documents"
        if: steps.sanitize.outputs.changed == 'true'
        run: |
          git config user.name  "Mundator Documentorum [E13·E14]"
          git config user.email "actions@github.com"
          git add papers/
          git commit -m "chore(sanitize): [E13·E14] auto-clean incoming documents [skip ci]"
          git push

      - name: "[E15] Render/Export — Publish intake summary"
        run: |
          echo "### Sovereign Paper Intake [E13·E14·E15]" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [ "${{ steps.sanitize.outputs.changed }}" == "true" ]; then
            echo "✅ Documents auto-sanitized (E14) and committed back to branch (E15)." >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "**What was fixed:** canister IDs redacted · logic code blocks replaced · brand strings normalised" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "✅ All documents were already public-showcase ready." >> "$GITHUB_STEP_SUMMARY"
          fi
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "*Mundator Documentorum [E13·E14·E15] — Medina Tech · Chaos Lab*" >> "$GITHUB_STEP_SUMMARY"
